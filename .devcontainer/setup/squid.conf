# =============================================================================
# Squid transparent proxy — domain allowlist via peek-and-splice
#
# Intercepts all outbound HTTP/HTTPS traffic (via iptables REDIRECT) and
# filters by domain. HTTPS filtering reads the SNI hostname from the TLS
# ClientHello without decrypting traffic (peek-and-splice). A cert is
# required by Squid but is only used internally — clients never see it
# because we splice (passthrough) rather than decrypt.
# =============================================================================

# --- Ports ---
# Forward proxy port (required by Squid, bound to localhost only)
http_port 127.0.0.1:3128
# Intercept ports (iptables redirects traffic here)
http_port 3129 intercept
https_port 3130 intercept ssl-bump cert=/etc/squid/bump.crt key=/etc/squid/bump.key name=https_intercept

# SSL cert helper (required for ssl-bump even in peek-and-splice mode)
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/spool/squid/ssl_db -M 4MB

# Use system CA bundle for outbound server certificate verification during peek
tls_outgoing_options capath=/etc/ssl/certs

# --- Domain allowlist ---
# HTTP: dstdomain reads Host header (.domain.com matches domain + subdomains)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"
# HTTPS: regex matches SNI for both bare domain and subdomains
# Generated by init-firewall.sh from allowed-domains.txt
acl allowed_ssl_domains ssl::server_name_regex "/etc/squid/allowed-ssl-domains.regex"

# --- SSL peek-and-splice (no decryption) ---
acl step1 at_step SslBump1

# Step 1: peek at ClientHello to read SNI
ssl_bump peek step1 all
# Splice (passthrough) allowed domains, terminate the rest
ssl_bump splice allowed_ssl_domains
ssl_bump terminate all

# --- Access control ---
# HTTPS intercept: allow all so ssl_bump can peek at SNI first.
# Filtering for HTTPS happens in ssl_bump rules above.
acl ssl_intercept_port myportname https_intercept
http_access allow ssl_intercept_port

# HTTP: filter by Host header via dstdomain
http_access allow allowed_domains
http_access deny all

# --- Logging ---
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# --- Disable caching (not needed for dev proxy) ---
cache deny all
